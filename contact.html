<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <title>Contact | Apple Avenue</title>
</head>
<body class="bg-[#0a0a0a] text-white antialiased selection:bg-red-600 selection:text-white">
    <nav class="fixed w-full z-50 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-black tracking-tighter italic">APPLE AVENUE</a>
        <div class="hidden md:flex space-x-12 text-sm font-medium tracking-widest uppercase">
            <a href="index.html" class="hover:text-red-500 transition-colors">Home</a>
            <a href="service.html" class="hover:text-red-500 transition-colors">Service</a>
            <a href="company.html" class="hover:text-red-500 transition-colors">Company</a>
            <a href="contact.html" class="text-red-500 transition-colors">Contact</a>
        </div>
    </nav>

    <main class="pt-32">
        <section class="max-w-7xl mx-auto px-6 py-20">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-24">
                <div>
                    <h1 class="text-7xl font-black tracking-tighter mb-12">CONNECT.</h1>
                    <p class="text-gray-400 text-lg mb-12">
                        アップルアベニューへのお問い合わせ、ご相談は以下のフォーム、またはお電話にて承っております。岡山でのプレミアムなカーライフの第一歩を、ここから。
                    </p>
                    <div class="space-y-8">
                        <div class="flex items-center space-x-6">
                            <div class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center">
                                <i data-lucide="phone" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase tracking-widest">Call Us</p>
                                <p class="text-xl font-bold">086-XXX-XXXX</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <div class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center">
                                <i data-lucide="map-pin" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase tracking-widest">Location</p>
                                <p class="text-xl font-bold">岡山県岡山市・倉敷市エリア</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-zinc-900/50 p-12 rounded-sm border border-white/5 backdrop-blur-sm">
                    <form class="space-y-8">
                        <div>
                            <label class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 block">Name</label>
                            <input type="text" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-red-500 outline-none transition-colors">
                        </div>
                        <div>
                            <label class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 block">Email</label>
                            <input type="email" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-red-500 outline-none transition-colors">
                        </div>
                        <div>
                            <label class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 block">Message</label>
                            <textarea rows="4" class="w-full bg-transparent border-b border-white/20 py-4 focus:border-red-500 outline-none transition-colors resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-white text-black font-black uppercase tracking-widest py-6 hover:bg-red-500 hover:text-white transition-all duration-500">
                            Send Inquiry
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
